name: 'manavarya-bot PR Reviewer'
description: 'AI PR reviewer. Default provider: Google Gemini (free tier). Also supports local Ollama.'
author: 'manavarya'
branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  github-token:
    description: 'GitHub token used to fetch the PR diff and post the review comment.'
    required: false
    default: ${{ github.token }}
  provider:
    description: 'LLM provider: "gemini" (default) or "ollama".'
    required: false
    default: 'gemini'
  model:
    description: 'Model name. Defaults: gemini-2.0-flash (gemini) / qwen2.5-coder:7b (ollama).'
    required: false
    default: ''
  gemini-api-key:
    description: 'Google AI Studio API key. Required when provider=gemini.'
    required: false
    default: ''
  ollama-url:
    description: 'Base URL of the Ollama server. Only used when provider=ollama.'
    required: false
    default: 'http://localhost:11434'
  max-file-bytes:
    description: 'Maximum bytes of a single file content included in the prompt.'
    required: false
    default: '20000'
  max-total-bytes:
    description: 'Maximum total bytes of file content included in the prompt.'
    required: false
    default: '120000'
  min-confidence:
    description: 'Drop issues below this confidence (0.0 - 1.0).'
    required: false
    default: '0.65'
  dry-run:
    description: 'If true, do not post a comment; print the report to the job log only.'
    required: false
    default: 'false'

outputs:
  risk-score:
    description: 'Computed risk score 1-10.'
  quality-score:
    description: 'Computed code quality score 0-100.'
  issue-count:
    description: 'Number of issues after confidence filtering.'

runs:
  using: 'node20'
  main: 'dist/index.js'
