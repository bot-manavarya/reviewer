name: manage collaborations

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Preview actions without writing'
        required: false
        default: 'false'

concurrency:
  group: manage-collaborations
  cancel-in-progress: false

jobs:
  manage:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run manager (poll ~15s for ~5m)
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
          BOT_CLASSIC_PAT: ${{ secrets.BOT_CLASSIC_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DRY_RUN: ${{ inputs.dry-run || 'false' }}
          POLL_SECONDS: '15'
          MAX_RUNTIME_SECONDS: '280'
        run: node dist-bootstrap/index.js
