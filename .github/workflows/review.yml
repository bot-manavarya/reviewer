name: manavarya-bot review (reusable)

on:
  workflow_call:
    inputs:
      provider:
        type: string
        required: false
        default: 'gemini'
      model:
        type: string
        required: false
        default: ''
      ollama-url:
        type: string
        required: false
        default: 'http://localhost:11434'
      runner-label:
        type: string
        required: false
        default: ''
      dry-run:
        type: string
        required: false
        default: 'false'
    secrets:
      bot-token:
        required: true
      gemini-api-key:
        required: false

jobs:
  review:
    runs-on: ${{ inputs.runner-label == '' && 'ubuntu-latest' || fromJSON(format('["self-hosted","{0}"]', inputs.runner-label)) }}
    permissions:
      pull-requests: write
      contents: read
      issues: write
    steps:
      - name: Run manavarya-bot
        uses: bot-manavarya/reviewer@main
        with:
          github-token: ${{ secrets.bot-token }}
          provider: ${{ inputs.provider }}
          model: ${{ inputs.model }}
          gemini-api-key: ${{ secrets.gemini-api-key }}
          ollama-url: ${{ inputs.ollama-url }}
          dry-run: ${{ inputs.dry-run }}
